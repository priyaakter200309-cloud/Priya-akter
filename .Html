<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 text-center border border-gray-100">
        
        <div class="flex justify-center mb-6">
            <div class="bg-red-50 rounded-full p-6">
                <svg class="w-16 h-16 text-red-500" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-red-600 mb-6">
            ভুল আনলক নাম্বার!
        </h1>

        <p class="text-gray-600 text-lg leading-relaxed mb-10 px-2">
            আপনার দেওয়া আনলক নাম্বারটি সঠিক নয়। অনুগ্রহ করে আপনার <span class="font-semibold">imo, whatsapp</span> অথবা <span class="font-semibold">মেসেজ</span> অপশনে আসা ৪-সংখ্যার সঠিক আনলক নাম্বারটি ব্যবহার করুন।
        </p>

        <button class="w-full bg-[#f14336] hover:bg-red-700 text-white font-bold py-4 px-6 rounded-2xl transition duration-300 shadow-lg active:scale-95">
            আবার চেষ্টা করুন
        </button>
        
    </div>

</body>
</html>
